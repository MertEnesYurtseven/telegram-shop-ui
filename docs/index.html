<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); padding: 20px; margin: 0; }
        
        /* Updated Product CSS for Images */
        .product { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding: 15px 0; }
        .product-info { display: flex; align-items: center; gap: 15px; }
        .product-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; background-color: rgba(0,0,0,0.05); }
        .product-details { display: flex; flex-direction: column; gap: 4px; }
        
        .controls { display: flex; align-items: center; gap: 10px; }
        button { background-color: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #fff); border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .checkout-box { margin-top: 30px; background: rgba(0,0,0,0.05); padding: 15px; border-radius: 8px; }
        input[type="number"] { width: 80px; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
        #checkout-btn { width: 100%; margin-top: 15px; font-weight: bold; }
        .promo-text { color: #e74c3c; font-size: 0.8em; display: block; }
        .fulfillment-box { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

    <h2>Store Catalog</h2>
    <div id="catalog"></div>

    <div class="checkout-box">
        
        <div class="fulfillment-box">
            <h3>Fulfillment Options</h3>
            <label><input type="radio" name="fulfillment" value="PICKUP" checked onchange="toggleFulfillment()"> Pickup In-Store</label>
            <label style="margin-left: 15px;"><input type="radio" name="fulfillment" value="DELIVERY" onchange="toggleFulfillment()"> Delivery (Min 50€)</label>
            
            <div id="pickup-options" style="margin-top: 15px;">
                <label>Select Location:</label><br>
                <select id="pickup-location" style="width: 100%; padding: 8px; margin-top: 5px;">
                    <option value="Store A - Downtown">Store A - Downtown</option>
                    <option value="Store B - Northside">Store B - Northside</option>
                </select>
            </div>
            
            <div id="delivery-options" style="margin-top: 15px; display: none;">
                <label>Delivery Address:</label><br>
                <textarea id="delivery-address" rows="3" style="width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;" placeholder="Enter full address..."></textarea>
                <span id="delivery-warning" style="color: red; font-size: 0.85em; display: none;">Delivery requires a minimum subtotal of 50.00€.</span>
            </div>
        </div>

        <h3>Cart Summary</h3>
        <p>Available Points: <strong id="user-points">0.00</strong>€</p>
        <p>Subtotal (w/ promos): <strong id="cart-total">0.00</strong>€</p>
        
        <label>Points to apply: <br>
            <input type="number" id="points-input" value="0" min="0" step="0.1" oninput="updateUI()">
        </label>
        
        <p><strong>Final Total: <span id="final-total">0.00</span>€</strong></p>
        <button id="checkout-btn" onclick="sendOrder()">Place Order (Cash on Delivery)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const maxPoints = parseFloat(urlParams.get('points')) || 0;
        document.getElementById('user-points').innerText = maxPoints.toFixed(2);

        // 1. ADDED IMAGE URLS TO CATALOG
        const catalog = [
            { id: 'ProductA', name: 'Product A', price: 10.0, image: 'a.jpg' },
            { id: 'ProductB', name: 'Product B', price: 15.0, image: 'b.jpg' },
            { id: 'ProductC', name: 'Product C', price: 20.0, image: 'c.jpg' }
        ];

        let cart = { 'ProductA': 0, 'ProductB': 0, 'ProductC': 0 };

        function renderCatalog() {
            const container = document.getElementById('catalog');
            container.innerHTML = '';
            catalog.forEach(product => {
                // 2. UPDATED HTML TEMPLATE TO INCLUDE <img src="...">
                container.innerHTML += `
                    <div class="product">
                        <div class="product-info">
                            <img src="${product.image}" alt="${product.name}" class="product-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'60\\' height=\\'60\\'><rect width=\\'60\\' height=\\'60\\' fill=\\'%23eee\\'/><text x=\\'50%\\' y=\\'50%\\' fill=\\'%23aaa\\' dy=\\'.3em\\' text-anchor=\\'middle\\'>No Img</text></svg>'">
                            <div class="product-details">
                                <strong>${product.name}</strong>
                                <span>${product.price.toFixed(2)}€</span>
                                <span class="promo-text">Buy 2 get 1 free!</span>
                            </div>
                        </div>
                        <div class="controls">
                            <button onclick="updateCart('${product.id}', -1)">-</button>
                            <span id="qty-${product.id}">${cart[product.id]}</span>
                            <button onclick="updateCart('${product.id}', 1)">+</button>
                        </div>
                    </div>
                `;
            });
        }

        function toggleFulfillment() {
            const type = document.querySelector('input[name="fulfillment"]:checked').value;
            if (type === 'PICKUP') {
                document.getElementById('pickup-options').style.display = 'block';
                document.getElementById('delivery-options').style.display = 'none';
            } else {
                document.getElementById('pickup-options').style.display = 'none';
                document.getElementById('delivery-options').style.display = 'block';
            }
            updateUI();
        }

        function updateCart(id, change) {
            cart[id] = Math.max(0, cart[id] + change);
            document.getElementById(`qty-${id}`).innerText = cart[id];
            updateUI();
        }

        function updateUI() {
            let subtotal = 0;
            catalog.forEach(product => {
                let qty = cart[product.id];
                let paidQty = qty - Math.floor(qty / 3);
                subtotal += paidQty * product.price;
            });

            document.getElementById('cart-total').innerText = subtotal.toFixed(2);

            let pointsInput = parseFloat(document.getElementById('points-input').value) || 0;
            if (pointsInput > maxPoints) {
                pointsInput = maxPoints;
                document.getElementById('points-input').value = maxPoints;
            }
            if (pointsInput > subtotal) {
                pointsInput = subtotal; 
                document.getElementById('points-input').value = subtotal;
            }

            let finalTotal = subtotal - pointsInput;
            document.getElementById('final-total').innerText = finalTotal.toFixed(2);
            
            const checkoutBtn = document.getElementById('checkout-btn');
            const type = document.querySelector('input[name="fulfillment"]:checked').value;
            const warning = document.getElementById('delivery-warning');

            if (type === 'DELIVERY' && subtotal < 50) {
                warning.style.display = 'block';
                checkoutBtn.disabled = true;
                checkoutBtn.innerText = "Minimum 50€ for Delivery";
            } else if (subtotal === 0) {
                warning.style.display = 'none';
                checkoutBtn.disabled = true;
                checkoutBtn.innerText = "Cart is empty";
            } else {
                warning.style.display = 'none';
                checkoutBtn.disabled = false;
                checkoutBtn.innerText = `Pay ${finalTotal.toFixed(2)}€ (Cash on Delivery)`;
            }
        }

        function sendOrder() {
            let finalCart = catalog
                .filter(p => cart[p.id] > 0)
                .map(p => ({ id: p.id, qty: cart[p.id] }));

            let pointsToUse = parseFloat(document.getElementById('points-input').value) || 0;
            const type = document.querySelector('input[name="fulfillment"]:checked').value;
            
            let addr = "";
            if (type === 'PICKUP') addr = document.getElementById('pickup-location').value;
            if (type === 'DELIVERY') addr = document.getElementById('delivery-address').value;

            if (type === 'DELIVERY' && addr.trim() === '') {
                tg.showAlert("Please enter a delivery address.");
                return;
            }

            const payload = {
                cart: finalCart,
                points_used: pointsToUse,
                fulfillment_type: type,
                address: addr
            };

            tg.sendData(JSON.stringify(payload));
            tg.close();
        }

        renderCatalog();
        updateUI();
    </script>
</body>
</html>
